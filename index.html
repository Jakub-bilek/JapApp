<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#e63946">
    <link rel="manifest" href="data:application/manifest+json,{&quot;name&quot;:&quot;Moje Japonština&quot;,&quot;short_name&quot;:&quot;Japonština&quot;,&quot;start_url&quot;:&quot;.&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;#f1faee&quot;,&quot;theme_color&quot;:&quot;#e63946&quot;,&quot;icons&quot;:[{&quot;src&quot;:&quot;https://cdn-icons-png.flaticon.com/512/197/197604.png&quot;,&quot;sizes&quot;:&quot;192x192&quot;,&quot;type&quot;:&quot;image/png&quot;}]}">
    <title>Japonský Slovníček</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Moje Japonština</h1>
        
        <div class="header-sticky">
            <div class="top-controls">
                <button class="btn-main" onclick="openModal('category')" style="margin:0;">+ přidat kategorii</button>
                <div class="search-container">
                    <input type="text" id="search-input" class="search-input" placeholder="Hledat..." oninput="handleSearch()">
                </div>
            </div>
        </div>

        <div class="scroll-content">
            <table class="main-table">
                <thead>
                    <tr style="background: #f8f9fa;">
                        <th class="col-drag"></th>
                        <th class="col-cz">Česky</th>
                        <th class="col-jp">Japonsky</th>
                        <th class="col-actions">Akce</th>
                    </tr>
                </thead>
                <tbody id="categories-container">
                </tbody>
            </table>
        </div>

        <div class="footer-sticky">
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button class="btn-main" onclick="exportAsJSON()">📥 Exportovat</button>
                <button class="btn-main" onclick="importFromJSON()">📤 Importovat</button>
                <button class="btn-main" onclick="clearAllData()">🗑️ Vymazat vše</button>
                <button class="btn-main" onclick="toggleReadingMode()">👁️ Režim čtení</button>
                <button class="btn-main" onclick="toggleStaffMode()" style="background-color: #f77f00;">🎯 Režim obsluha</button>
            </div>
        </div>
    </div>

    <!-- Modální okno -->
    <div id="modal-overlay">
        <div class="modal">
            <span class="modal-close" onclick="closeModal()">×</span>
            <h2 id="modal-title">Přidat</h2>
            <form onsubmit="handleModalSubmit(event)">
                <div class="form-group">
                    <label id="label-cz">Česky:</label>
                    <input type="text" id="input-cz" placeholder="Např. Ahoj" required>
                </div>
                <div class="form-group">
                    <label id="label-jp">Japonsky:</label>
                    <input type="text" id="input-jp" placeholder="Např. こんにちは" required>
                </div>
                <div class="form-group" id="reading-group" style="display:none;">
                    <label for="input-reading">Čtení:</label>
                    <input type="text" id="input-reading" placeholder="Např. Konnichiwa">
                </div>
                <div id="file-input-group" style="display:none;">
                    <div id="drop-zone">
                        <span>Přetáhni soubor sem nebo klikni pro výběr</span>
                        <input type="file" id="file-input" accept=".json" style="display:none;">
                        <div class="plus-icon">＋</div>
                    </div>
                    <div id="file-name-display"></div>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn-confirm">Uložit</button>
                </div>
            </form>
            <div class="export-section" id="export-info" style="display:none;">
                <p>Vyber JSON soubor k importu:</p>
                <div id="storage-info"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
